<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>Об авторе — Колобок</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%;
  background: #111;
  color: #eee;
  font-family: system-ui, -apple-system, sans-serif;
  line-height: 1.45;
}
body {
  padding: calc(12px + env(safe-area-inset-top, 0px)) 16px calc(20px + env(safe-area-inset-bottom, 0px));
  max-width: 520px;
  margin: 0 auto;
}
.back-row {
  margin-bottom: 14px;
}
.back-row a {
  font-size: 13px;
  font-weight: 600;
  color: #7eb8e8;
  text-decoration: none;
  border-bottom: 1px solid rgba(126, 184, 232, 0.4);
}
.back-row a:hover { color: #b8dcf8; }
.back-row a:active { opacity: 0.85; }
h1 {
  font-size: clamp(1.25rem, 4vw, 1.5rem);
  font-weight: 800;
  color: #E8A020;
  letter-spacing: 0.04em;
  margin-bottom: 16px;
}
.card-author {
  background: #1a1a1a;
  border: 1px dashed #333;
  border-radius: 14px;
  padding: 16px 18px;
}
.card-author h2 {
  font-size: 1rem;
  font-weight: 700;
  color: #888;
  margin-bottom: 6px;
}
.card-placeholder {
  font-size: 14px;
  color: #666;
  margin: 0;
  line-height: 1.5;
}
</style>
</head>
<body>
  <p class="back-row"><a href="index.html">← На главную</a></p>
  <h1>Об авторе</h1>
  <article class="card card-author">
    <h2>Скоро</h2>
    <p class="card-placeholder">Здесь будет кратко об авторе игр. Раздел пока в заготовке.</p>
  </article>
</body>
</html>
